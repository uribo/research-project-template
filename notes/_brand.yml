meta:
  name:
    short: 0x96f Theme
    full: 0x96f Theme
    link: https://0x96f.dev/

# Contrast policy (WCAG):
# - Body text is near-black on white / white on near-black (>=17:1, both modes).
# - Accent roles are AA-tuned to meet AA-Large / UI (>=3.0:1) against BOTH the
#   light (#ffffff) and dark (#1a1a1a) backgrounds. A single-valued brand token
#   cannot reach AA-normal 4.5:1 in both modes at once (mathematical ceiling
#   ~3.6-4.2), so links are underlined (typography.link.decoration) to stay
#   distinguishable without relying on color alone. For strict AA-normal links,
#   split link color per prefers-color-scheme via a theme.scss.
# - `respect-user-color-scheme: true` in notes/_metadata.yml drives light/dark.
color:
  palette:
    ink: "#1a1a1a" # near-black: body text on light, page surface on dark
    paper: "#ffffff"
    purple: "#8a7be0" # white 3.5 / dark 5.0
    blue: "#2a9db8" # white 3.2 / dark 5.5
    green: "#5a9e2f" # white 3.3 / dark 5.3
    yellow: "#b5892a" # white 3.2 / dark 5.5 (amber for legibility)
    red: "#e05555" # white 3.8 / dark 4.6
    grey: "#8a8a8a" # white 3.5 / dark 5.0

    # Bootstrap color aliases
    gray: grey
    cyan: blue

  background:
    light: paper
    dark: ink
  foreground:
    light: ink
    dark: paper
  primary: purple
  secondary: grey
  success: green
  info: blue
  warning: yellow
  danger: red
  light: paper
  dark: ink

typography:
  link:
    decoration: underline
