# CI for the analysis project. Installs dependencies from DESCRIPTION via pak
# (no renv.lock required), validates the targets pipeline, and runs tests.
#
# Quarto is intentionally NOT rendered here: the example pipeline omits the
# Quarto target when the Quarto CLI is absent, keeping CI light and portable.
#
# Once you adopt a renv.lock, you may switch dependency installation to
# r-lib/actions/setup-renv@v2.
#
# This workflow runs only on GitHub (push / pull_request); it is inert locally.
name: R-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"all"'

      - name: Validate targets pipeline
        run: Rscript -e 'targets::tar_validate()'

      - name: Run tests
        run: Rscript tests/testthat.R
