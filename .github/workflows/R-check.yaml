# CI for the analysis project. Dependencies are discovered by scanning the
# code with renv::dependencies() (library() calls and pkg::fun() usage), so no
# dependency manifest is needed. pak installs the R packages together with
# their system requirements (e.g. igraph needs GLPK, sf needs GDAL) — renv pins
# R packages but not system libraries, so pak fills that gap on the runner.
#
# Quarto is intentionally NOT rendered here: the example pipeline omits the
# Quarto target when the Quarto CLI is absent, keeping CI light and portable.
#
# Once you adopt a renv.lock, you may switch dependency installation to
# r-lib/actions/setup-renv@v2. Enabling renv's pak backend there
# (RENV_CONFIG_PAK_ENABLED=TRUE) unifies R-package pinning (renv) and system
# requirements (pak) into a single renv::restore(), replacing the manual pak
# step below. Left to the downstream project; the template does not adopt it.
#
# This workflow runs only on GitHub (push / pull_request); it is inert locally.
name: R-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # Bootstrap pak from its own repo (an explicit URL, so this does not need
      # a CRAN mirror — the project .Rprofile at the repo root otherwise shadows
      # the profile where setup-r sets repos). pak then installs renv (used only
      # to scan the code) and every discovered package together with its system
      # requirements, which it resolves and apt-installs automatically on GitHub
      # Actions runners.
      - name: Install dependencies (with system requirements) from code
        run: |
          Rscript -e '
            install.packages("pak", repos = sprintf(
              "https://r-lib.github.io/p/pak/stable/%s/%s/%s",
              .Platform$pkgType, R.version$os, R.version$arch
            ))
            pak::pkg_install("renv")
            deps <- setdiff(
              unique(renv::dependencies(quiet = TRUE)$Package),
              rownames(installed.packages())
            )
            message("Discovered dependencies: ", paste(sort(deps), collapse = ", "))
            if (length(deps)) pak::pkg_install(deps)
          '

      - name: Validate targets pipeline
        run: Rscript -e 'targets::tar_validate()'

      - name: Run tests
        run: Rscript tests/testthat.R
