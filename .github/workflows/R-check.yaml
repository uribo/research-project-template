# CI for the analysis project. Dependencies are discovered by scanning the
# code with renv::dependencies() (library() calls and pkg::fun() usage), so no
# dependency manifest is needed. Packages install as binaries via the public
# Posit Package Manager.
#
# Quarto is intentionally NOT rendered here: the example pipeline omits the
# Quarto target when the Quarto CLI is absent, keeping CI light and portable.
#
# Once you adopt a renv.lock, you may switch dependency installation to
# r-lib/actions/setup-renv@v2.
#
# This workflow runs only on GitHub (push / pull_request); it is inert locally.
name: R-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # The project .Rprofile (loaded from the repo root) shadows the one where
      # setup-r configures repos, so a bare Rscript sees no CRAN mirror. Set
      # repos explicitly: the public PPM binary repo (RSPM env var exported by
      # use-public-rspm) with a source-CRAN fallback. The HTTPUserAgent header
      # makes PPM serve Linux binaries.
      - name: Install dependencies discovered from code
        run: |
          Rscript -e '
            rspm <- Sys.getenv("RSPM")
            options(repos = if (nzchar(rspm)) c(RSPM = rspm) else c(CRAN = "https://cloud.r-project.org"))
            options(HTTPUserAgent = sprintf("R/%s R (%s)", getRversion(), paste(getRversion(), R.version["platform"], R.version["arch"], R.version["os"])))
            if (!requireNamespace("renv", quietly = TRUE)) install.packages("renv")
            deps <- unique(renv::dependencies(quiet = TRUE)$Package)
            message("Discovered dependencies: ", paste(sort(deps), collapse = ", "))
            to_install <- setdiff(deps, rownames(installed.packages()))
            if (length(to_install)) install.packages(to_install)
          '

      - name: Validate targets pipeline
        run: Rscript -e 'targets::tar_validate()'

      - name: Run tests
        run: Rscript tests/testthat.R
